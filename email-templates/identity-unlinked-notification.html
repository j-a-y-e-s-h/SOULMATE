<!-- Supabase Auth -> Email Templates -> Identity Unlinked Notification -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A sign-in method was removed - Soulmate</title>
</head>
<body style="margin:0;padding:0;background-color:#f0e8de;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#f0e8de;padding:48px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="max-width:520px;background-color:#fffaf5;border-radius:24px;overflow:hidden;box-shadow:0 8px 40px rgba(184,79,69,0.12);">
          <tr>
            <td style="height:5px;background:linear-gradient(90deg,#4b7165 0%,#77a093 50%,#c9956b 100%);"></td>
          </tr>
          <tr>
            <td align="center" style="padding:40px 40px 0;">
              <div style="width:64px;height:64px;background-color:#edf6f2;border-radius:18px;font-size:28px;line-height:64px;text-align:center;border:1.5px solid #cfe4dc;display:inline-block;">
                &#10134;
              </div>
              <p style="margin:14px 0 2px;font-size:13px;letter-spacing:2.5px;text-transform:uppercase;color:#4b7165;font-weight:700;">SOULMATE</p>
              <p style="margin:0;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#8fa89f;">Security Notification</p>
            </td>
          </tr>
          <tr>
            <td style="padding:28px 40px 0;"><div style="height:1px;background:linear-gradient(90deg,transparent,#d7e8dc,transparent);"></div></td>
          </tr>
          <tr>
            <td style="padding:32px 40px 0;">
              <h1 style="margin:0 0 14px;font-size:26px;font-weight:700;color:#1f2330;text-align:center;font-family:Georgia,serif;line-height:1.3;">
                A sign-in identity was removed
              </h1>
              <p style="margin:0;font-size:15px;line-height:1.75;color:#62584d;text-align:center;">
                The sign-in provider <strong style="color:#1f2330;">{{ .Provider }}</strong> has been removed from <strong style="color:#1f2330;">{{ .Email }}</strong>.
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding:32px 40px 28px;">
              <a href="{{ .SiteURL }}" style="display:inline-block;padding:14px 40px;background:linear-gradient(135deg,#4b7165 0%,#62897c 100%);color:#ffffff;font-size:15px;font-weight:700;text-decoration:none;border-radius:50px;letter-spacing:0.3px;">
                Review Account Security
              </a>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding:0 40px 36px;">
              <p style="margin:0;font-size:12px;color:#b0a090;">&#10084;&nbsp; Soulmate &middot; Modern Indian Matchmaking</p>
            </td>
          </tr>
          <tr>
            <td style="height:4px;background:linear-gradient(90deg,#c9956b 0%,#77a093 50%,#4b7165 100%);"></td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
