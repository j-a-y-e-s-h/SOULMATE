name: Main Branch Guard

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  owner-only-direct-push:
    runs-on: ubuntu-latest
    env:
      REPO_OWNER: ${{ github.repository_owner }}
      PUSH_ACTOR: ${{ github.actor }}
      PUSH_REF: ${{ github.ref_name }}
      EXTRA_DIRECT_PUSH_ALLOWLIST: ${{ vars.MAIN_BRANCH_DIRECT_PUSH_ALLOWLIST }}
      ALLOWLIST_FILE: .github/main-branch-direct-push-allowlist.txt
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check direct push allowlist
        shell: bash
        run: |
          set -euo pipefail

          trim() {
            local value="$1"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "$value"
          }

          declare -a allowed_entries
          allowed_entries=("$REPO_OWNER")

          normalized_extra="${EXTRA_DIRECT_PUSH_ALLOWLIST//$'\r'/}"
          normalized_extra="${normalized_extra//$'\n'/,}"
          IFS=',' read -ra raw_variable_entries <<< "$normalized_extra"
          for entry in "${raw_variable_entries[@]}"; do
            candidate="$(trim "$entry")"
            if [ -n "$candidate" ]; then
              allowed_entries+=("$candidate")
            fi
          done

          if [ -f "$ALLOWLIST_FILE" ]; then
            while IFS= read -r line || [ -n "$line" ]; do
              candidate="$(trim "${line%%#*}")"
              if [ -n "$candidate" ]; then
                allowed_entries+=("$candidate")
              fi
            done < "$ALLOWLIST_FILE"
          fi

          declare -A seen_entries
          declare -a unique_allowed_entries
          for entry in "${allowed_entries[@]}"; do
            if [ -z "${seen_entries[$entry]+x}" ]; then
              seen_entries["$entry"]=1
              unique_allowed_entries+=("$entry")
            fi
          done

          allowed_actors=""
          is_allowed="false"
          for candidate in "${unique_allowed_entries[@]}"; do
            if [ -n "$allowed_actors" ]; then
              allowed_actors="$allowed_actors, $candidate"
            else
              allowed_actors="$candidate"
            fi

            if [ "$candidate" = "$PUSH_ACTOR" ]; then
              is_allowed="true"
            fi
          done

          {
            echo "## Main branch guard"
            echo ""
            echo "- Branch: \`$PUSH_REF\`"
            echo "- Push actor: \`$PUSH_ACTOR\`"
            echo "- Allowed direct push actors: \`$allowed_actors\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$is_allowed" = "true" ]; then
            echo "Direct push allowed for $PUSH_ACTOR."
            exit 0
          fi

          echo "Direct pushes to $PUSH_REF are limited to: $allowed_actors."
          echo "Add more actors in $ALLOWLIST_FILE or the repository variable MAIN_BRANCH_DIRECT_PUSH_ALLOWLIST."
          echo "Example file entries: github-actions[bot] and dependabot[bot]"
          echo "Otherwise, push to a feature branch and open a pull request."
          exit 1
